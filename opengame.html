<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="shortcut icon" type="image/x-icon" href="./logo-200x200.png">
    <title>王者自定义房间加入</title>
    <link rel="stylesheet" href="css/pages/openGame.css">
</head>

<body>

    <div class="container">
        <div class="info-card">
            <div class="info-title">当前房间</div>
            <div class="info-content" id="roomInfo">加载中...</div>
            <div class="hint-text" id="hintMsg">点击下方按钮加入阵营</div>
        </div>

        <div class="button-group">
            <button class="btn btn-primary" id="btnBlue">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 8v8M8 12h8" />
                </svg>
                加入蓝方阵营
            </button>
            <button class="btn btn-primary" id="btnRed">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M12 8v8M8 12h8" />
                </svg>
                加入红方阵营
            </button>
            <button class="btn btn-secondary" id="btnExit">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M18 8L22 12L18 16" />
                    <path d="M2 12H22" />
                    <path d="M12 2C6.48 2 2 6.48 2 12" />
                </svg>
                退出房间
            </button>

            <div class="divider"></div>

            <button class="btn btn-secondary" id="btnViewCustom">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="3" width="18" height="18" rx="2" />
                    <path d="M9 8h6M9 12h6M9 16h4" />
                </svg>
                查看自定义配置
            </button>
            <button class="btn btn-outline" id="btnHome">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M3 12l9-9 9 9M5 10v10h14V10" />
                </svg>
                返回首页
            </button>
        </div>

        <!-- 详情面板 -->
        <div class="detail-panel" id="detailPanel">
            <div class="detail-header">
                <span class="detail-title" id="detailTitle">自定义配置</span>
                <button class="detail-close" id="btnClosePanel">×</button>
            </div>
            <div class="detail-content" id="detailContent"></div>
            <div class="detail-actions">
                <button class="btn-small" id="btnCopyConfig">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        style="margin-right: 4px;">
                        <rect x="9" y="9" width="13" height="13" rx="2" />
                        <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
                    </svg>
                    复制配置
                </button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">已复制到剪贴板</div>

    <!-- 入口脚本 -->
    <script type="module" src="./js/pages/openGame.js"></script>
</body>

</html>
