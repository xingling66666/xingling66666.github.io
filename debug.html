<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>debug</title>
</head>

<body>
    <h3>debug</h3>
    <hr>

    <button id="exportBtn">导出localStorage</button>
    <button id="clearBtn">清空localStorage</button>
    <br><br>
    <textarea id="exportArea" rows="4" cols="70" readonly placeholder="导出数据"></textarea>
    <br><br>
    <textarea id="importArea" rows="4" cols="70" placeholder="粘贴json导入"></textarea>
    <br>
    <button id="mergeBtn">合并导入</button>
    <button id="replaceBtn">替换导入</button>

    <hr>

    <button id="unregisterSW">注销service workers</button>
    <button id="unregisterReload">注销并重载</button>
    <div id="swMsg" style="font-size:12px;color:gray;margin-top:5px"></div>

    <hr>

    <h4>游戏启动器 (json + 房间号)</h4>
    <textarea id="gameJson" rows="5" cols="70"></textarea>
    <br>
    <button id="randomRoomBtn">随机房间号</button>
    <button id="copyRoomBtn">复制房间号</button>
    <button id="launchZsf">启动正式服</button>
    <button id="launchTyf">启动体验服</button>
    <div style="font-size:12px;color:gray;margin-top:5px">点击随机房间号会生成19位随机数并更新json中的ullRoomid/ullExternUid</div>

    <script>
        (function() {
            // 元素
            var gameJson = document.getElementById('gameJson');
            var randomRoomBtn = document.getElementById('randomRoomBtn');
            var copyRoomBtn = document.getElementById('copyRoomBtn');
            var launchZsf = document.getElementById('launchZsf');
            var launchTyf = document.getElementById('launchTyf');
            var exportBtn = document.getElementById('exportBtn');
            var clearBtn = document.getElementById('clearBtn');
            var exportArea = document.getElementById('exportArea');
            var importArea = document.getElementById('importArea');
            var mergeBtn = document.getElementById('mergeBtn');
            var replaceBtn = document.getElementById('replaceBtn');
            var unregisterSW = document.getElementById('unregisterSW');
            var unregisterReload = document.getElementById('unregisterReload');
            var swMsg = document.getElementById('swMsg');

            // 随机19位数字
            function randomRoomId() {
                var id = '';
                for (var i = 0; i < 19; i++) {
                    id += Math.floor(Math.random() * 10);
                }
                return id;
            }

            // 获取json数据
            function getJsonData() {
                try {
                    return JSON.parse(gameJson.value);
                } catch(e) {
                    alert('json格式错误: ' + e.message);
                    return null;
                }
            }

            // 更新json到文本框
            function updateJson(data) {
                gameJson.value = JSON.stringify(data, null, 2);
            }

            // 启动游戏
            function launchGame(server) {
                var data = getJsonData();
                if (!data) return;
                var jsonStr = JSON.stringify(data);
                var base64Str = btoa(jsonStr);
                var scheme = '';
                if (server === 'zsf') {
                    scheme = 'tencentmsdk1104466820://';
                } else if (server === 'tyf') {
                    scheme = 'tencentmsdk1104791911://';
                } else {
                    alert('请选择正式服或体验服');
                    return;
                }
                var finalUrl = scheme + '?gamedata=SmobaLaunch_' + base64Str;
                alert('启动' + (server === 'zsf' ? '正式服' : '体验服') + '\n房间号: ' + data.ullRoomid);
                window.location.href = finalUrl;
            }

            // 导出localstorage
            exportBtn.onclick = function() {
                var obj = {};
                for (var i = 0; i < localStorage.length; i++) {
                    var k = localStorage.key(i);
                    obj[k] = localStorage.getItem(k);
                }
                exportArea.value = JSON.stringify(obj, null, 2);
            };

            // 清空localstorage
            clearBtn.onclick = function() {
                if (confirm('清空所有localstorage?')) {
                    localStorage.clear();
                    alert('已清空');
                    exportArea.value = '';
                }
            };

            // 合并导入
            mergeBtn.onclick = function() {
                try {
                    var d = JSON.parse(importArea.value);
                    for (var k in d) {
                        localStorage.setItem(k, d[k]);
                    }
                    alert('合并导入成功');
                    exportBtn.onclick();
                } catch(e) {
                    alert('json错误: ' + e.message);
                }
            };

            // 替换导入
            replaceBtn.onclick = function() {
                try {
                    var d = JSON.parse(importArea.value);
                    localStorage.clear();
                    for (var k in d) {
                        localStorage.setItem(k, d[k]);
                    }
                    alert('替换导入成功');
                    exportBtn.onclick();
                } catch(e) {
                    alert('json错误: ' + e.message);
                }
            };

            // 注销service worker
            unregisterSW.onclick = async function() {
                if (!navigator.serviceWorker) {
                    alert('当前浏览器不支持service worker');
                    swMsg.innerText = '不支持sw';
                    return;
                }
                try {
                    var regs = await navigator.serviceWorker.getRegistrations();
                    var cnt = 0;
                    for (var r of regs) {
                        await r.unregister();
                        cnt++;
                    }
                    alert('已注销 ' + cnt + ' 个service worker');
                    swMsg.innerText = '已注销 ' + cnt + ' 个sw';
                } catch(e) {
                    alert('注销失败: ' + e.message);
                }
            };

            // 注销并重载
            unregisterReload.onclick = async function() {
                if (!navigator.serviceWorker) {
                    location.reload();
                    return;
                }
                try {
                    var regs = await navigator.serviceWorker.getRegistrations();
                    for (var r of regs) {
                        await r.unregister();
                    }
                    alert('已注销, 即将重载');
                    location.reload();
                } catch(e) {
                    alert('注销失败: ' + e.message);
                }
            };

            // 随机房间号
            randomRoomBtn.onclick = function() {
                var data = getJsonData();
                if (!data) return;
                var newId = randomRoomId();
                data.ullRoomid = newId;
                data.ullExternUid = newId;
                updateJson(data);
                alert('新房间号: ' + newId);
            };

            // 复制房间号
            copyRoomBtn.onclick = function() {
                var data = getJsonData();
                if (data && data.ullRoomid) {
                    navigator.clipboard.writeText(data.ullRoomid).then(function() {
                        alert('已复制: ' + data.ullRoomid);
                    }).catch(function() {
                        alert('复制失败');
                    });
                } else {
                    alert('无法获取房间号');
                }
            };

            // 启动正式服
            launchZsf.onclick = function() {
                launchGame('zsf');
            };

            // 启动体验服
            launchTyf.onclick = function() {
                launchGame('tyf');
            };

            // 默认数据
            var defaultData = {
                "createType": "2",
                "mapID": "20011",
                "mapType": "1",
                "teamerNum": "10",
                "ullRoomid": "748475839401491449",
                "ullExternUid": "748475839401491449",
                "roomName": "1",
                "platType": "2",
                "campid": "1",
                "AddPos": "0",
                "AddType": "2",
                "banHerosCamp1": [],
                "banHerosCamp2": [],
                "customDefineItems": ["0:6", "28:6"]
            };
            gameJson.value = JSON.stringify(defaultData, null, 2);
        })();
    </script>
</body>

</html>
